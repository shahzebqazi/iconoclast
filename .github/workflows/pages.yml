# Publishes the contents of site/ as the site root (not the repo root).
# Prefer Settings → Pages → Source: GitHub Actions so / is site/index.html (no /site/ prefix).
# If Pages uses the repo root instead, GitHub shows README unless index.html exists—see repo root index.html.
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate site assets
        run: npm run assets:build

      - name: Prepare Pages artifact (repo site/ = published site root)
        run: |
          set -e
          cp CNAME site/CNAME
          test -f site/.nojekyll || touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
