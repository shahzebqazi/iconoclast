<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" role="img" aria-labelledby="title desc">
  <title id="title">Iconoclast Audio</title>
  <desc id="desc">Glass-style banner with gradient background and title</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1220"/>
      <stop offset="45%" style="stop-color:#141e35"/>
      <stop offset="100%" style="stop-color:#1a0f28"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="50%" style="stop-color:#a8c8ff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb8ff;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#7eb8ff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#c9a227;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <rect width="920" height="200" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <ellipse cx="720" cy="40" rx="180" ry="90" fill="#4a6fa5" opacity="0.12"/>
  <ellipse cx="180" cy="160" rx="200" ry="70" fill="#c9a227" opacity="0.07"/>
  <!-- Glass panel -->
  <rect x="48" y="36" width="824" height="128" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <rect x="48" y="36" width="824" height="64" rx="18" fill="url(#shine)" opacity="0.9"/>
  <!-- Subtle waveform -->
  <path d="M 80 142 Q 140 118 200 142 T 360 142 T 520 142 T 680 142 T 840 142" fill="none" stroke="url(#wave)" stroke-width="2" opacity="0.9"/>
  <path d="M 80 152 Q 160 128 240 152 T 400 152 T 560 152 T 720 152 T 880 152" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Typography -->
  <text x="72" y="98" font-family="ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="32" font-weight="700" fill="#f0f4fc" letter-spacing="-0.03em">Iconoclast Audio</text>
  <text x="72" y="132" font-family="ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="14" fill="#a8b4cc">Audio engineering in the open</text>
</svg>
